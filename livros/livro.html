<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Redirecionando — Livros Loner</title>
  <script src="../assets/js/books.js?v=livros-loner-16"></script>
  <script>
    const slug = new URLSearchParams(location.search).get('slug');
    const book = (window.LIVROS_LONER_BOOKS || []).find(item => item.slug === slug);
    location.replace(book ? `../${book.page}` : 'index.html');
  </script>
</head>
<body><p>Redirecionando para a página do livro…</p></body>
</html>
